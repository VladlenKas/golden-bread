version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: golden-bread-postgres
    environment:
      POSTGRES_DB: golden_bread
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: src/GoldenBread.Api/Dockerfile
    container_name: golden-bread-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__GoldenBread=Host=postgres;Database=golden_bread;Username=postgres;Password=root
      - TZ=Asia/Yekaterinburg
      - Cors__Origins__0=http://localhost:5173
    ports:
      - "5000:8080"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/dataprotection-keys:/app/data/dataprotection-keys
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: golden-bread-web
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
